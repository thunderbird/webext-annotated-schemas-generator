name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Check Formatting (Prettier)
        run: npm run lint:format

      - name: Run Linter (ESLint)
        run: npm run lint
